language: node_js
sudo: required
node_js:
  - "lts/*"
before_install:
  - chmod +x deploy.sh
cache:
  directories:
    - node_modules
script:
  - ./deploy.sh
deploy:
  provider: pages
  skip_cleanup: true
  local_dir: wiki/.vuepress/dist
  github_token: $GITHUB_TOKEN  # 在 GitHub 中生成，用于允许 Travis 向你的仓库推送代码。在 Travis 的项目设置页面进行配置，设置为 secure variable
  keep_history: true
branch: master
